<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Responsive Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header class="header">
    <h1>My Portfolio</h1>
    <button id="themeToggle">Theme</button>
  </header>

  <main class="grid">

    <section class="box hero">
      <h2>Hello 👋</h2>
      <p>Responsive Portfolio using CSS Grid + Flexbox</p>
    </section>

    <section class="box about">
      <h2>About</h2>
      <p>I am learning Full Stack Development.</p>
    </section>

    <section class="box projects">
      <h2>Projects</h2>

      <div class="cards">
        <div class="card">Project 1</div>
        <div class="card">Project 2</div>
        <div class="card">Project 3</div>
      </div>

    </section>

  </main>

  <footer class="footer">
    <p>© 2026 Portfolio</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
